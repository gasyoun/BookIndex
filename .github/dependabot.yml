version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    groups:
      node-tooling:
        patterns:
          - "@playwright/test"
          - "typescript"
          - "vite"
          - "vite-plugin-singlefile"
      runtime-dependencies:
        patterns:
          - "fuse.js"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Install Node dependencies
        run: npm install

      - name: JS syntax check
        run: node --check v3_app.js

      - name: Encoding / mojibake check
        run: python scripts/check_encoding.py

      - name: Validate content data
        run: python scripts/validate_content.py app_data.json

      - name: Runtime smoke test (21/21)
        run: python runtime_test.py

      - name: Build aaz-index.html
        run: python scripts/build_aaz_index.py

      - name: Ensure committed aaz-index.html is in sync
        run: git diff --exit-code -- aaz-index.html

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npx playwright test

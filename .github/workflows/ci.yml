name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Dependency security audit
        run: npm run check:security

      - name: Build standalone artifact
        run: npm run build

      - name: Static security policy guard
        run: npm run check:security:static

      - name: TypeScript / JS typecheck
        run: npm run typecheck

      - name: JS syntax checks
        run: npm run check:js

      - name: UI inline style guard
        run: npm run check:ui

      - name: Performance budget
        run: npm run check:perf

      - name: Encoding / mojibake check
        run: python scripts/check_encoding.py

      - name: Validate content data
        run: python scripts/validate_content.py app_data.json

      - name: Ensure manual audit queue is in sync
        run: |
          python scripts/content_report.py app_data.json --write-quality-queue tests/index-audit-queue.json
          git diff --exit-code -- tests/index-audit-queue.json

      - name: Ensure split modules are in sync
        run: |
          python scripts/split_app_data.py app_data.json --out-dir data/modules
          git diff --exit-code -- data/modules
          python scripts/assemble_app_data.py --modules-dir data/modules --out app_data.json
          git diff --exit-code -- app_data.json

      - name: Runtime smoke test (21/21)
        run: python runtime_test.py

      - name: Ensure committed aaz-index.html is in sync
        run: git diff --exit-code -- aaz-index.html

      - name: Vite build smoke
        run: |
          npm run build:vite
          npm run build
          git diff --exit-code -- aaz-index.html

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E full suite (Playwright)
        run: npm run check:e2e

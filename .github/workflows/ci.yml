name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: JS syntax check
        run: node --check v3_app.js

      - name: Validate content data
        run: python scripts/validate_content.py app_data.json

      - name: Runtime smoke test (20/20)
        run: python runtime_test.py

      - name: Build aaz-index.html smoke
        run: |
          python - <<'PY'
          import pathlib
          data = pathlib.Path("app_data.json").read_text(encoding="utf-8")
          js = pathlib.Path("v3_app.js").read_text(encoding="utf-8")
          tpl = pathlib.Path("v3_template.html").read_text(encoding="utf-8")
          esc = data.replace("\\", "\\\\").replace("`", "\\`").replace("${", "\\${")
          html = tpl.replace("__APP_SCRIPT__", js.replace("__APP_DATA_STRING__", "`" + esc + "`"))
          pathlib.Path("aaz-index.html").write_text(html, encoding="utf-8-sig")
          print("build smoke: aaz-index.html generated, size=", pathlib.Path("aaz-index.html").stat().st_size)
          PY

name: Post-Deploy Quality

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-deploy-quality-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  BOOKINDEX_BASE_URL: https://gasyoun.github.io/BookIndex/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  live-quality-gates:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Live deploy health check
        run: npm run check:deploy

      - name: Lighthouse and accessibility budgets
        run: npm run check:a11y
